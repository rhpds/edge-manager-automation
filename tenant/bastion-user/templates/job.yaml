---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-bastion
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    app.kubernetes.io/name: configure-bastion
    app.kubernetes.io/part-of: bastion
spec:
  backoffLimit: 20
  template:
    metadata:
      labels:
        app.kubernetes.io/name: configure-bastion
        app.kubernetes.io/part-of: bastion
    spec:
      restartPolicy: OnFailure
      containers:
        - name: run-ansible-playbook
          image: quay.io/jswanson/general-ansible-ee:rh1-2026
          imagePullPolicy: Always
          command: ["ansible-playbook", "/runner/playbook.yaml", "--inventory", "/runner/inventory.yaml", "-vv"]
          volumeMounts:
            - name: inventory
              mountPath: /runner/inventory.yaml
              subPath:  inventory.yaml
            - name: playbook
              mountPath: /runner/playbook.yaml
              subPath: playbook.yaml
            - name: scratch
              mountPath: /.ansible
      volumes:
        - name: inventory
          configMap:
            name: bastion-ansible-job-inputs
        - name: playbook
          configMap:
            name: bastion-ansible-job-inputs
        - name: scratch
          emptyDir: {}
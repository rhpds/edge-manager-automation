---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.guid }}-tenants
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - list:
      elements:
{{- $userCount := int .Values.user.count }}
{{- range $index := until $userCount }}
      - tenant: {{ $.Values.user.prefix }}{{ add $index 1}} 
{{- end }}
  template:
    metadata:
      name: '{{ .Values.guid }}-{{- "{{" }}.tenant{{- "}}" }}-services'
      namespace: openshift-gitops
      labels:
        guid.rhdp.io: {{ .Values.guid }}
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source: 
        repoURL: https://github.com/rhpds/edge-manager-automation.git
        targetRevision: main
        path: tenant/services/
        helm:
          values: |
            gitBranch: main
            tenant: {{ "{{" }}.tenant{{- "}}"}}
            bastionSshPassword: "{{ .Values.bastion_ssh_password }}"
            guid: {{ .Values.guid }}
            satelliteActivationKey: "{{ .Values.satellite_activationkey }}"
            satelliteOrg: "{{ .Values.satellite_org }}"
            satelliteUrl: "{{ .Values.satellite_url }}"
            giteaAdminUsername: "{{ .Values.gitea_admin_username }}"
            giteaAdminPassword: "{{ .Values.gitea_admin_password }}"
            openshiftClusterIngressDomain: "{{ .Values.deployer.domain }}"
            rhemVersion: "{{ .Values.rhemVersion }}"
            userPassword: "{{ .Values.userPassword }}"
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true

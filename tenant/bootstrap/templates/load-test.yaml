---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.guid }}-load-test
  namespace: openshift-gitops
  labels:
    application: {{ .Values.guid }}-load-test
    guid.rhdp.io: {{ .Values.guid }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: ''
    server: https://kubernetes.default.svc
    namespace: wksp-{{ .Values.guid }}
  project: default
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
  source:
    repoURL: https://github.com/rhpds/edge-fleet-gitops.git
    targetRevision: rh1-2026
    path: tenant/load-test/
    helm:
      values: |
        gitBranch: rh1-2026
        user:
          {{- with .Values.user }}
          prefix: "{{ .prefix }}"
          count: "{{ .count }}"
          {{- end }}
        guid: "{{ .Values.guid }}"
        bastionSshPassword: "{{ .Values.bastion_ssh_password }}"
        giteaAdminUsername: "{{ .Values.gitea_admin_username }}"
        giteaAdminPassword: "{{ .Values.gitea_admin_password }}"
        openshiftClusterIngressDomain: "{{ .Values.openshiftClusterIngressDomain }}"
        satelliteActivationKey: "{{ .Values.satellite_activationkey }}"
        satelliteOrg: "{{ .Values.satellite_org }}"
        satelliteUrl: "{{ .Values.satellite_url }}"
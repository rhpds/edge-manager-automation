---
apiVersion: batch/v1
kind: Job
metadata:
  name: configure-gitea
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    app.kubernetes.io/name: configure-gitea
    app.kubernetes.io/part-of: gitea-user
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: configure-gitea
        app.kubernetes.io/part-of: gitea-user
    spec:
      restartPolicy: OnFailure
      containers:
        - name: run-ansible-playbook
          image: quay.io/jswanson/general-ansible-ee:rh1-2026
          imagePullPolicy: Always
          command: ["ansible-playbook", "/runner/playbook.yaml", "-vv"]
          volumeMounts:
            - name: playbook
              mountPath: /runner/playbook.yaml
              subPath: playbook.yaml
            - name: scratch
              mountPath: /.ansible
      volumes:
        - name: playbook
          configMap:
            name: gitea-user-ansible-job-inputs
        - name: scratch
          emptyDir: {}
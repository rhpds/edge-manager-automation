---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.guid }}-{{ .Values.tenant }}-populate-pull-secret
  namespace: openshift-gitops
  labels:
    application: {{ .Values.guid }}-{{ .Values.tenant }}-populate-pull-secret
    guid.rhdp.io: {{ .Values.guid }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: ''
    server: https://kubernetes.default.svc
    namespace: wksp-{{ .Values.guid }}-{{ .Values.tenant }}
  project: default
  syncPolicy:
    automated:
      prune: true
  source:
    repoURL: https://github.com/rhpds/edge-manager-automation.git
    targetRevision: main
    path: tenant/populate-pull-secret/
    helm:
      values: |
        gitBranch: main
        tenant: {{ .Values.tenant }}
        guid: "{{ .Values.guid }}"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.guid }}-janitor-oauth-manager-rb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: oauth-manager
subjects:
  - kind: ServiceAccount
    name: {{ .Values.guid }}-janitor
    namespace: default
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.guid }}-janitor-job
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
  labels:
    app.kubernetes.io/name: janitor-job
    app.kubernetes.io/part-of: janitor
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: janitor-job
        app.kubernetes.io/part-of: janitor
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Values.guid }}-janitor
      containers:
        - name: run-ansible-playbook
          image: quay.io/jswanson/general-ansible-ee:rh1-2026
          imagePullPolicy: Always
          command: ["ansible-playbook", "/runner/playbook.yaml", "--inventory", "inventory.yaml", "-vv"]
          volumeMounts:
            - name: playbook
              mountPath: /runner/playbook.yaml
              subPath: playbook.yaml
            - name: inventory
              mountPath: /runner/inventory.yaml
              subPath: inventory.yaml
            - name: scratch
              mountPath: /.ansible
      volumes:
        - name: playbook
          configMap:
            name: janitor-ansible-job-inputs
        - name: inventory
          configMap:
            name: janitor-ansible-job-inputs
        - name: scratch
          emptyDir: {}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: allow-read-pull-secret-{{ .Values.rhemVirtualMachine.username }}-{{ .Values.guid }}
  namespace: openshift-config
subjects:
  - kind: ServiceAccount
    name: secret-reader
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: allow-read-pull-secret
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-rhem-agent-config-creater
subjects:
  - kind: ServiceAccount
    name: rhem-agent-config-creater
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: rhem-agent-config-creater-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-{{ .Values.guid }}-{{ .Values.tenant }}-rhem-agent-config-creater
  namespace: openshift-operators
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
  - kind: ServiceAccount
    name: rhem-agent-config-creater
    namespace: {{ .Release.Namespace }}
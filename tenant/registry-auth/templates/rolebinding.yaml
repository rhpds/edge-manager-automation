---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.guid }}-{{ .Values.tenant }}-registry-auth-rolebinding
subjects:
- kind: ServiceAccount
  name: registry-auth-sa
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Values.guid }}-{{ .Values.tenant }}-registry-auth-role
  apiGroup: rbac.authorization.k8s.io
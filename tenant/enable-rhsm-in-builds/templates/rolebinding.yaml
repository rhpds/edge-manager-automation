---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-rhsm-secret-writer
subjects:
- kind: ServiceAccount
  name: secret-copier
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: secret-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.guid }}-{{ .Values.tenant }}-bind-rhsm-secret-reader
  namespace: openshift-config-managed
subjects:
- kind: ServiceAccount
  name: secret-copier
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: rhsm-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.guid }}-oauth-manager-rb
  namespace: openshift-config
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: oauth-manager
subjects:
  - kind: ServiceAccount
    name: oauth-manager
    namespace: wksp-{{ .Values.guid }}
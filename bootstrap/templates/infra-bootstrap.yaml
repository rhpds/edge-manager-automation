---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-bootstrap
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    application: infra-bootstrap
spec:
  destination:
    name: ''
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated: {}
  source:
    repoURL: https://github.com/rhpds/edge-manager-automation.git
    targetRevision: main
    path: infra/bootstrap/
    helm:
      values: |
        gitBranch: main
        bastionSshPassword: "{{ .Values.bastion_ssh_password }}"
        rhemVersion: 1.0.2

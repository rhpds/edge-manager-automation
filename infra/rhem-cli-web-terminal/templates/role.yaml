---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configmaps-and-builds
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "update", "delete", "patch"]
  - apiGroups:
    - build.openshift.io
    resources:
    - '*'
    verbs:
    - '*'
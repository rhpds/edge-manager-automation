---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-configmaps-and-builds
subjects:
  - kind: ServiceAccount
    name: patch-web-terminal-tooling
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: configmaps-and-builds
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: allow-image-pulling
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-puller
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:serviceaccounts:openshift-terminal
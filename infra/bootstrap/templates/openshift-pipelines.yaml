---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openshift-pipelines
  namespace: openshift-gitops
  labels:
    application: openshift-pipelines
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: ''
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      prune: true
  source:
    repoURL: https://github.com/rhpds/edge-manager-automation.git
    targetRevision: {{ .Values.gitBranch | default "main" }}
    path: infra/openshift-pipelines/
    helm:

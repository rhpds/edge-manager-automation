---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth-manager
  namespace: openshift-gitops
  labels:
    application: oauth-manager
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    name: ''
    server: https://kubernetes.default.svc
  project: default
  syncPolicy:
    automated:
      prune: true
  source:
    repoURL: https://github.com/rhpds/edge-manager-automation.git
    targetRevision: {{ .Values.gitBranch | default "main" }}
    path: infra/oauth-manager/
    helm:
